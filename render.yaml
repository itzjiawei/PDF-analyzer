services:
  - type: web
    name: pdf-analyzer-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: pdf-analyzer-db
          property: connectionString
      - key: API_CORS_ORIGINS
        value: https://pdf-analyzer-web.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GEMINI_ANSWER_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_TRANSCRIPTION_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_TTS_MODEL
        value: gemini-3.1-flash-tts-preview
      - key: GEMINI_TTS_VOICE
        value: Kore
      - key: DEEPGRAM_MODEL
        value: nova-3
      - key: DEEPGRAM_LANGUAGE
        value: en
      - key: DEEPGRAM_KEYTERMS
        value: incident readiness,hybrid search,reranking,retrieval quality,answer traceability,signal quality,governance controls,executive reporting

  - type: web
    name: pdf-analyzer-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://pdf-analyzer-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: pdf-analyzer-db
    plan: free
