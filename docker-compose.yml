services:
  db:
    image: pgvector/pgvector:pg16
    container_name: voice-rag-postgres
    environment:
      POSTGRES_DB: voice_rag
      POSTGRES_USER: voice_rag
      POSTGRES_PASSWORD: voice_rag
    ports:
      - "5433:5432"
    volumes:
      - voice_rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_rag -d voice_rag"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  voice_rag_pgdata:
